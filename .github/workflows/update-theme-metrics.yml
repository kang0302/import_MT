name: Build master.json (only)

on:
  workflow_dispatch:
  schedule:
    # daily 12:00 KST = 03:00 UTC
    - cron: "0 3 * * *"

# ✅ 커밋/푸시 경쟁 방지: KR/FMP/Freeze와 동일 그룹
concurrency:
  group: mt-freeze-commit-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-master:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests pykrx lxml

      # ✅ A안: theme metrics 업데이트 금지 (테마는 build_freeze만 만진다)
      # - name: Run theme metrics updater
      #   run: |
      #     python scripts/update_theme_metrics.py

      - name: Build master.json (assets + business fields)
        run: |
          python scripts/build_master_json.py

      - name: Commit & push master.json only (rebase-safe)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e

          git config user.name "moneytree-bot"
          git config user.email "moneytree-bot@users.noreply.github.com"

          # ✅ 원격 변경 흡수 (fetch-first 방지)
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

          # ✅ master만 추적
          git add data/master/master.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: build master.json"

          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:"${GITHUB_REF_NAME}"