name: Update KR Valuation + Freeze (PYKRX)

on:
  workflow_dispatch: {}
  schedule:
    # 16:00 KST = 07:00 UTC
    - cron: "0 7 * * *"

# ✅ 다른 커밋 워크플로와 충돌 방지 (FMP/Freeze와 동일 그룹)
concurrency:
  group: mt-freeze-commit-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run KR valuation updater (PYKRX)
        run: |
          python -u scripts/update_valuation_kr.py

      - name: Inject metrics into Freeze + update theme index
        run: |
          python -u scripts/build_freeze.py

      - name: Commit & push if changed (rebase-safe)
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # ✅ fetch-first 방지
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

          git add data/cache/valuation_kr.json
          git add data/theme/T_*.json
          git add data/theme/index.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: KR valuation + freeze update (PYKRX)"
          git push origin HEAD:"${GITHUB_REF_NAME}"