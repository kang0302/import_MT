name: Update KR Returns + Freeze (PYKRX, DISABLED)

# DISABLED 2026-05-23 — PYKRX cron 이 update-close-kr.yml (EODHD, 07:05 UTC) 가
# 5분 전에 만든 returns_kr.json 을 덮어쓰던 사고를 차단. schedule 제거 + manual dispatch 만 유지.
# (PYKRX 최종 제거 결정은 PARKED — 메모리: project_pykrx_purge_parked.md)
on:
  workflow_dispatch: {}

concurrency:
  group: mt-freeze-commit-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run KR returns updater (PYKRX)
        run: |
          python -u scripts/update_return_kr.py

      - name: Inject metrics into Freeze + update theme index
        run: |
          python -u scripts/build_freeze.py

      - name: Commit & push if changed (rebase-safe)
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase -X theirs --autostash origin "${GITHUB_REF_NAME}"

          # ✅ rebase가 unresolved conflict를 남기고 끝났는지 검사 (commit 전 abort)
          if [ -n "$(git ls-files -u)" ]; then
            echo "❌ Unmerged paths after rebase:"
            git status --short
            exit 1
          fi
          if grep -rlE '^(<<<<<<< |=======$|>>>>>>> )' data/ 2>/dev/null; then
            echo "❌ Conflict markers found in data/ after rebase. Aborting before commit."
            exit 1
          fi

          git add data/cache/returns_kr.json
          git add data/theme/T_*.json
          git add data/theme/index.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: KR returns + freeze update (PYKRX)"
          git push origin HEAD:"${GITHUB_REF_NAME}"