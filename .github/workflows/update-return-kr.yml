name: Update KR Returns + Freeze (PYKRX)

on:
  workflow_dispatch: {}
  schedule:
    # valuation 이후 10분 뒤 (16:10 KST = 07:10 UTC)
    - cron: "10 7 * * *"

concurrency:
  group: mt-freeze-commit-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run KR returns updater (PYKRX)
        run: |
          python -u scripts/update_return_kr.py

      - name: Inject metrics into Freeze + update theme index
        run: |
          python -u scripts/build_freeze.py

      - name: Commit & push if changed (rebase-safe)
        shell: bash
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

          git add data/cache/returns_kr.json
          git add data/theme/T_*.json
          git add data/theme/index.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: KR returns + freeze update (PYKRX)"
          git push origin HEAD:"${GITHUB_REF_NAME}"