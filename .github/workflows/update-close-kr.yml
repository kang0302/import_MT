name: Update KR Close + Freeze (EODHD)

on:
  workflow_dispatch: {}
  schedule:
    # 16:05 KST = 07:05 UTC (매일)
    - cron: "5 7 * * *"

concurrency:
  group: mt-freeze-commit-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ✅ Level 1: 스크립트 실행 전에 최신 main 으로 동기화 → 산출물이 최신 기준으로 생성됨
      #    (commit 시 rebase 불필요 → -X theirs 로 fresh 캐시를 버리던 데이터 손실 차단)
      - name: Sync to latest main BEFORE running scripts
        run: |
          git fetch origin
          git reset --hard "origin/${GITHUB_REF_NAME}"

      - name: Run KR close updater (EODHD)
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          EODHD_SLEEP_SEC: "0.15"
          EODHD_RETRIES: "3"
          EODHD_TIMEOUT_SEC: "30"
          EODHD_SENTINEL: "005930.KO"
        run: |
          python -u scripts/update_close_kr_eodhd.py

      - name: Inject metrics into Freeze + update theme index
        run: |
          python -u scripts/build_freeze.py

      # ✅ Level 1 commit: rebase/merge 로 fresh 캐시를 버리지 않는다.
      #    push 거부(=다른 잡이 먼저 push) 시 → 최신으로 reset 후 스크립트 재실행(재생성) 후 재시도.
      #    build_freeze 는 모든 캐시(KR+FMP)를 읽어 theme 를 완전 재생성하므로 충돌 자체가 없다.
      - name: Commit & push if changed (regenerate-on-latest)
        shell: bash
        env:
          EODHD_API_KEY: ${{ secrets.EODHD_API_KEY }}
          EODHD_SLEEP_SEC: "0.15"
          EODHD_RETRIES: "3"
          EODHD_TIMEOUT_SEC: "30"
          EODHD_SENTINEL: "005930.KO"
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          stage_and_commit() {
            git add data/cache/valuation_kr.json data/cache/returns_kr.json \
                    data/theme/T_*.json data/theme/index.json
            if git diff --cached --quiet; then
              echo "No changes to commit."
              return 1
            fi
            git commit -m "chore: KR close + freeze update (EODHD)"
            return 0
          }

          stage_and_commit || exit 0

          for i in 1 2 3 4 5; do
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "push success on attempt $i"
              exit 0
            fi
            echo "push attempt $i rejected → 최신으로 reset 후 재생성"
            git reset --hard HEAD~1 || true
            git fetch origin
            git reset --hard "origin/${GITHUB_REF_NAME}"
            python -u scripts/update_close_kr_eodhd.py
            python -u scripts/build_freeze.py
            stage_and_commit || exit 0
          done
          echo "❌ push failed after retries"; exit 1