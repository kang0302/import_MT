name: Update Overseas Returns + Freeze (FMP)

on:
  workflow_dispatch: {}
  schedule:
    # valuation보다 10분 뒤 (KST 06:50 = UTC 21:50)
    - cron: "50 21 * * *"

concurrency:
  group: mt-freeze-commit-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Overseas returns updater (FMP)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python -u scripts/update_return_fmp.py

      - name: Inject metrics into Freeze + update theme index
        run: |
          python -u scripts/build_freeze.py

      - name: Commit & push if changed (rebase-safe)
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

          # ✅ rebase가 unresolved conflict를 남기고 끝났는지 검사 (commit 전 abort)
          if [ -n "$(git ls-files -u)" ]; then
            echo "❌ Unmerged paths after rebase:"
            git status --short
            exit 1
          fi
          if grep -rlE '^(<<<<<<< |=======$|>>>>>>> )' data/ 2>/dev/null; then
            echo "❌ Conflict markers found in data/ after rebase. Aborting before commit."
            exit 1
          fi

          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add data/cache/returns_fmp.json
          git add data/theme/T_*.json
          git add data/theme/index.json

          git commit -m "chore: overseas returns + freeze update (FMP)"
          git push origin HEAD:"${GITHUB_REF_NAME}"