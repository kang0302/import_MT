name: Update Overseas Valuation + Freeze (FMP)

on:
  workflow_dispatch: {}
  schedule:
    # KST 06:40 = UTC 21:40 (미국장 마감 후)
    - cron: "40 21 * * *"

permissions:
  contents: write

# ✅ returns 워크플로와 겹치면 push 충돌이 나므로 group을 분리
# ✅ cancel-in-progress로 '겹치는 런'은 최신만 남김
concurrency:
  group: update-fmp-valuation-freeze
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # ✅ pull --rebase 안정화를 위해 전체 히스토리 필요
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Overseas valuation updater (FMP)
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python -u scripts/update_valuation_fmp.py

      - name: Inject metrics into Freeze + update theme index
        run: |
          python -u scripts/build_freeze.py

      - name: Commit & push if changed
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 변경 없으면 종료
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add data/cache/valuation_fmp.json
          git add data/theme/T_*.json
          git add data/theme/index.json

          # commit이 없을 수도 있으니 안전 처리
          git commit -m "chore: overseas valuation + freeze update (FMP)" || echo "No commit created."

          # ✅ push 충돌 대응: pull --rebase 후 push (재시도 포함)
          for i in 1 2 3; do
            echo "Attempt $i: git pull --rebase && git push"
            git pull --rebase origin main || true

            if git push origin main; then
              echo "Push succeeded."
              exit 0
            fi

            echo "Push failed (likely fetch-first). Retrying in 5s..."
            sleep 5
          done

          echo "Push failed after retries."
          exit 1